# =============================================================================
# Literature Example Case: Cooling Crystallization of KDP in a COBR
# =============================================================================
# Purpose:
#   - Transferable, self-contained example for surrogate-model and robust-MPC work
#   - Uses literature kinetic parameters from Gunawan et al. (2002)
#   - Adapts the batch kinetics to a simple continuous cooling-crystallization COBR
#
# Notes:
#   - The paper reports growth and nucleation kinetics plus parameter uncertainty.
#   - It does not provide a ready-to-use continuous cooling solubility law for this COBR.
#   - Therefore the temperature dependence is introduced primarily through the
#     surrogate solubility fit below. Arrhenius activation energies are set to zero.
#   - Seeding is introduced via a dedicated side inlet after the hottest zone so the
#     solids profile develops more realistically along the cooled reactor sections.
# =============================================================================

system_properties:
  densities:
    reaction_mixture: 1150.0
    oil: 784.0
    steel: 8000.0
    crystal: 2338.0
  heat_capacities:
    reaction_mixture: 3900.0
    oil: 2000.0
    steel: 500.0
  molar_weights:
    solute: 0.13609

reactor_properties:
  reactor:
    length: 18.0
    inner_diameter: 0.0254
    outer_diameter: 0.0320
    cross_sectional_area: 0.00050671
    volume: 0.00912078
    number_tanks_in_series: 120

  jackets:
    - inlet: 0.0
      outlet: 2.25
      inner_diameter: 0.0400
      outer_diameter: 0.0460
      cross_sectional_area: 0.00093934
      volume: 0.00211352
    - inlet: 2.25
      outlet: 6.75
      inner_diameter: 0.0400
      outer_diameter: 0.0460
      cross_sectional_area: 0.00093934
      volume: 0.00422703
    - inlet: 6.75
      outlet: 12.375
      inner_diameter: 0.0400
      outer_diameter: 0.0460
      cross_sectional_area: 0.00093934
      volume: 0.00528379
    - inlet: 12.375
      outlet: 18.0
      inner_diameter: 0.0400
      outer_diameter: 0.0460
      cross_sectional_area: 0.00093934
      volume: 0.00528379

  thermostats:
    - name: Thermostat_1
      heating_power: 8000.0
      cooling_power: 8000.0
      max_vol_flow: 0.00006
      volume: 0.0012
      max_pressure: 250000.0
      min_volume: 0.0010
    - name: Thermostat_2
      heating_power: 8000.0
      cooling_power: 8000.0
      max_vol_flow: 0.00006
      volume: 0.0012
      max_pressure: 250000.0
      min_volume: 0.0010
    - name: Thermostat_3
      heating_power: 8000.0
      cooling_power: 8000.0
      max_vol_flow: 0.00006
      volume: 0.0012
      max_pressure: 250000.0
      min_volume: 0.0010
    - name: Thermostat_4
      heating_power: 8000.0
      cooling_power: 8000.0
      max_vol_flow: 0.00006
      volume: 0.0012
      max_pressure: 250000.0
      min_volume: 0.0010

  microwaves: []
  side_inlets:
    - position: 2.45
      name: Seed_inlet
      concentrations:
        zeroth_moment: 5.0e10
        first_moment: 3.0e6
        second_moment: 180.0
        concentration_solute_dissolved: 0.0
        concentration_solute_solid: 650.0

measurements:
  temperature_reactor:
    positions: [0.0, 6.0, 12.0, 18.0]
    names: [T_reactor_0m, T_reactor_6m, T_reactor_12m, T_reactor_18m]
    measurement_noise: false
  temperature_thermostat:
    names: [T_thermostat_0, T_thermostat_1, T_thermostat_2, T_thermostat_3]
    measurement_noise: false
  temperature_setpoint:
    names: [T_setpoint_thermostat_0, T_setpoint_thermostat_1, T_setpoint_thermostat_2, T_setpoint_thermostat_3]
    measurement_noise: false
  flow_inlet:
    names: flow_inlet
    measurement_noise: false

model_parameters:
  thermal:
    heat_transfer:
      reactor_heat_transfer_coefficient: 2200.0
      jacket_heat_transfer_coefficient: 1200.0
      heat_loss_coefficient: 12.0
    pid_control:
      proportional_gain: [9000.0, 9000.0, 9000.0, 9000.0]
      integral_gain: [0.45, 0.45, 0.45, 0.45]
      max_inflow_multipliers: [0.45, 0.45, 0.45, 0.45]
      heating_power_avg_time_constant: [180.0, 180.0, 180.0, 180.0]

  kinetic:
    source: "Gunawan et al. (2002), Experiment 2, continuous-flow adaptation"

    # Reported literature kinetics
    # The nominal values below are deliberately moderated for a seeded COBR:
    # spontaneous nucleation is suppressed and crystal growth is made more
    # nonlinear in supersaturation so the solids profile is closer to an S-shape.
    birth:
      k_birth: 2.0e7
      exp_birth: 4.2
      activation_energy_birth: 0.0

    growth_axis_1:
      k_growth_1: 1.2e-6
      exp_growth_1: 2.0
      activation_energy_growth_1: 0.0

    growth_axis_2:
      k_growth_2: 8.0e-6
      exp_growth_2: 2.2
      activation_energy_growth_2: 0.0

    # Continuous COBR adaptation:
    # A deliberately steeper but still plausible exponential fit in mol/m^3 is used
    # to make the cooling-driven precipitation visually informative in the COBR.
    # This corresponds roughly to:
    #   - ~510 mol/m^3 at 20 C
    #   - ~1030 mol/m^3 at 45 C
    #   - ~3590 mol/m^3 at 90 C
    solubility:
      A: 290.0
      B: 0.0280

    reference_temperature_kinetics: 298.15
    shape_factor:
      k_v: 0.60

    literature_uncertainty:
      experiment: 2
      exp_growth_1_std: 0.05
      k_growth_1_std: 2.35e-6
      exp_growth_2_std: 0.06
      k_growth_2_std: 1.2617e-5
      exp_birth_std: 0.10
      k_birth_std: 8.0e9

simulation_settings:
  solver:
    integration_tool: cvodes
    abstol: 1.0e-8
    reltol: 1.0e-8
    t_step: 60.0

  smoothing:
    smoothing_factor_heating: 0.01
    smoothing_factor_integral: 0.001
    anti_windup_factor: 0.99999
    smoothing_parameter: 1.0e-6

initial_conditions:
  warm_up: false
  temperature_reactor:
    - [0.0, 348.15]
    - [18.0, 293.15]
  temperature_jacket:
    - [0.0, 348.15]
    - [18.0, 293.15]
  temperature_inner_wall:
    - [0.0, 348.15]
    - [18.0, 293.15]
  temperature_outer_wall:
    - [0.0, 348.15]
    - [18.0, 293.15]
  temperature_thermostat: [363.15, 338.15, 313.15, 293.15]
  integral_term: [0.0, 0.0, 0.0, 0.0]
  heating_power_avg: [0.0, 0.0, 0.0, 0.0]

  zeroth_moment:
    - [0.0, 0.0]
    - [18.0, 0.0]
  first_moment:
    - [0.0, 0.0]
    - [18.0, 0.0]
  second_moment:
    - [0.0, 0.0]
    - [18.0, 0.0]
  concentration_solute_dissolved:
    - [0.0, 2600.0]
    - [18.0, 2600.0]
  concentration_solute_solid:
    - [0.0, 0.0]
    - [18.0, 0.0]

operating_conditions:
  inputs:
    flow_inlet: 4.1667e-6
    T_setpoint_thermostats: [363.15, 338.15, 313.15, 293.15]
    flow_side_inlets: [4.2e-8]
    power_microwaves: []

  tvp:
    T_flow_inlet: 348.15
    T_environment: 293.15
    T_side_inlets: [298.15]

  chemistry_inflow:
    zeroth_moment: 0.0
    first_moment: 0.0
    second_moment: 0.0
    concentration_solute_dissolved: 2600.0
    concentration_solute_solid: 0.0
