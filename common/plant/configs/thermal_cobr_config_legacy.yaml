    - inlet: 2.25
      outlet: 6.75
      inner_diameter: 0.0400
      outer_diameter: 0.0460
      cross_sectional_area: 0.00093934
      volume: 0.00422703
    - inlet: 6.75
      outlet: 12.375
      inner_diameter: 0.0400
      outer_diameter: 0.0460
      cross_sectional_area: 0.00093934
      volume: 0.00528379
    - inlet: 12.375
      outlet: 18.0
      inner_diameter: 0.0400
      outer_diameter: 0.0460
      cross_sectional_area: 0.00093934
      volume: 0.00528379

  thermostats:
    - name: Thermostat_1
      heating_power: 8000.0
      cooling_power: 8000.0
      max_vol_flow: 0.00006
      volume: 0.0012
      max_pressure: 250000.0
      min_volume: 0.0010
    - name: Thermostat_2
      heating_power: 8000.0
      cooling_power: 8000.0
      max_vol_flow: 0.00006
