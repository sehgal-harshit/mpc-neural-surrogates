      min_volume: 0.0010
    - name: Thermostat_4
      heating_power: 8000.0
      cooling_power: 8000.0
      max_vol_flow: 0.00006
      volume: 0.0012
      max_pressure: 250000.0
      min_volume: 0.0010

  microwaves: []
  side_inlets: []

measurements:
  temperature_reactor:
    positions: [0.0, 6.0, 12.0, 18.0]
    names: [T_reactor_0m, T_reactor_6m, T_reactor_12m, T_reactor_18m]
    measurement_noise: false
  temperature_thermostat:
    names: [T_thermostat_0, T_thermostat_1, T_thermostat_2, T_thermostat_3]
    measurement_noise: false
  temperature_setpoint:
    names: [T_setpoint_thermostat_0, T_setpoint_thermostat_1, T_setpoint_thermostat_2, T_setpoint_thermostat_3]
    measurement_noise: false
  flow_inlet:
    names: flow_inlet
    measurement_noise: false

model_parameters:
  thermal:
    heat_transfer:
      reactor_heat_transfer_coefficient: 2200.0
      jacket_heat_transfer_coefficient: 1200.0
      heat_loss_coefficient: 12.0
    pid_control:
      proportional_gain: [9000.0, 9000.0, 9000.0, 9000.0]
      integral_gain: [0.45, 0.45, 0.45, 0.45]
      max_inflow_multipliers: [0.45, 0.45, 0.45, 0.45]
      heating_power_avg_time_constant: [180.0, 180.0, 180.0, 180.0]

simulation_settings:
  solver:
    integration_tool: cvodes
    abstol: 1.0e-8
    reltol: 1.0e-8
    t_step: 60.0

  smoothing:
    smoothing_factor_heating: 0.01
    smoothing_factor_integral: 0.001
    anti_windup_factor: 0.99999
    smoothing_parameter: 1.0e-6

initial_conditions:
  warm_up: false
  temperature_reactor:
    - [0.0, 348.15]
    - [18.0, 293.15]
  temperature_jacket:
    - [0.0, 348.15]
    - [18.0, 293.15]
  temperature_inner_wall:
    - [0.0, 348.15]
    - [18.0, 293.15]
  temperature_outer_wall:
    - [0.0, 348.15]
    - [18.0, 293.15]
  temperature_thermostat: [363.15, 338.15, 313.15, 293.15]
  integral_term: [0.0, 0.0, 0.0, 0.0]
  heating_power_avg: [0.0, 0.0, 0.0, 0.0]

operating_conditions:
  inputs:
    flow_inlet: 4.1667e-6
    T_setpoint_thermostats: [363.15, 338.15, 313.15, 293.15]

  tvp:
    T_flow_inlet: 348.15
    T_environment: 293.15
